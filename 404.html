<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        .container1 {
            background: rgb(112, 206, 249);
            height: 50vh;
        }

        .container1 h1 {
            font-size: 150px;
            margin: auto;
            line-height: 1.3;
            text-align: center;
            color: rgb(41, 159, 255);
            z-index: -2;
        }

        .character {
            position: absolute;
            left: 50%;
            top: 20%;
            z-index: 1;
            height: 30vh;
            overflow: hidden;
        }

        .head {
            height: 30vw;
            width: 30vw;
            max-width: 150px;
            max-height: 150px;
            background: peachpuff;
            border-radius: 50%;
            margin: auto;
            position: relative;
            z-index: 2;
        }

        .body {
            width: 15vw;
            height: 100px;
            background: rgb(242, 82, 242);
            margin: auto;
            position: relative;
            top: -10px;
            border-radius: 30px;
            z-index: 1;
        }

        .container2 {
            height: 50vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 10;
        }

        .container2 h1 {
            font-size: 45px;
            font-weight: 400;
            padding: 50px 0 0;
        }

        .container2 p {
            font-size: 23px;
            color: rgb(99, 99, 99);
        }

        .container2 button {
            font-size: 27px;
            color: white;
            padding: 10px 30px;
            background: rgb(41, 159, 255);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all .25s;
        }

        .container2 button:hover {
            background: rgb(0, 140, 255);
        }

        .character {
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, -10px);
            }
        }
    </style>
</head>

<body>
    <div class="container1">
        <h1 class="big">404</h1>
        <div class="character">
            <div class="head"></div>
            <div class="body"></div>
        </div>
    </div>

    <div class="container2">
        <h1>Oops! Page not found</h1>
        <p>You’ve found a page that even Google Maps can’t locate. Let's head back.</p>
        <a href="index.html"><button>Go Back</button></a>
    </div>
</body>

</html>
